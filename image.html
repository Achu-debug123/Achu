<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker Images Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 20px;
        }
        
        button:hover {
            background: #764ba2;
        }
        
        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .image-card {
            background: #f5f5f5;
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .image-card:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
            transform: translateY(-5px);
        }
        
        .image-card h3 {
            color: #667eea;
            margin-bottom: 10px;
            word-break: break-word;
        }
        
        .image-info {
            font-size: 14px;
            color: #666;
            margin: 8px 0;
        }
        
        .image-info strong {
            color: #333;
        }
        
        .loading {
            text-align: center;
            color: #667eea;
            font-size: 18px;
        }
        
        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        
        .success {
            background: #efe;
            color: #3c3;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐳 Docker Images Viewer</h1>
        <button onclick="loadImages()">Load Docker Images</button>
        <div id="message"></div>
        <div id="imagesList" class="images-grid"></div>
    </div>

    <script>
        async function loadImages() {
            const imagesList = document.getElementById('imagesList');
            const message = document.getElementById('message');
            
            imagesList.innerHTML = '<div class="loading">Loading Docker images...</div>';
            message.innerHTML = '';
            
            try {
                const response = await fetch('/api/docker/images');
                const data = await response.json();
                
                if (data.error) {
                    message.innerHTML = `<div class="error">Error: ${data.error}</div>`;
                    imagesList.innerHTML = '';
                    return;
                }
                
                if (data.images.length === 0) {
                    imagesList.innerHTML = '<div class="loading">No Docker images found</div>';
                    return;
                }
                
                imagesList.innerHTML = data.images.map(img => `
                    <div class="image-card" onclick="showDetails('${img.id}')">
                        <h3>${img.repository || 'N/A'}</h3>
                        <div class="image-info">
                            <strong>Tag:</strong> ${img.tag || 'N/A'}
                        </div>
                        <div class="image-info">
                            <strong>Image ID:</strong> ${img.id.substring(0, 12)}
                        </div>
                        <div class="image-info">
                            <strong>Size:</strong> ${img.size}
                        </div>
                        <div class="image-info">
                            <strong>Created:</strong> ${new Date(img.created).toLocaleDateString()}
                        </div>
                    </div>
                `).join('');
                
                message.innerHTML = `<div class="success">Found ${data.images.length} Docker images</div>`;
            } catch (error) {
                message.innerHTML = `<div class="error">Error: ${error.message}</div>`;
                imagesList.innerHTML = '';
            }
        }
        
        function showDetails(imageId) {
            alert(`Image ID: ${imageId}`);
        }
        
        // Load images on page load
        window.onload = loadImages;
    </script>
</body>
</html>
